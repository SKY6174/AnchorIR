<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>anchor-dashboard</title>
    <!-- 브라우저 백화/하얀 깜빡임 현상을 원천 방지하기 위한 선제 테마 인라인 스크립트 -->
    <script>
      (function() {
        try {
          var darkTheme = localStorage.getItem("anchor_dark_mode");
          // 테마 캐시가 없으면 기본 다크모드(true) 적용
          var isDark = darkTheme === null ? true : JSON.parse(darkTheme);
          var bg = isDark ? "#0f0f12" : "#f9fafb";
          var fg = isDark ? "#ffffff" : "#111827";
          
          // CSS 스타일 강제 주입
          var style = document.createElement("style");
          style.innerHTML = "html, body { background-color: " + bg + " !important; color: " + fg + " !important; margin: 0; padding: 0; height: 100%; }";
          document.head.appendChild(style);
          
          if (isDark) {
            document.documentElement.classList.add("dark-mode-init");
          } else {
            document.documentElement.classList.add("light-mode-init");
          }
        } catch (e) {
          console.error("Theme preload error:", e);
        }
      })();
    </script>
  </head>
  <body>
    <!-- 리액트 컴포넌트가 로드되어 덮어쓰기 전까지 노출될 우아한 백그라운드 웰컴 스피너 -->
    <div id="root">
      <div id="pre-loader" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; transition: opacity 0.25s ease;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
          <div style="font-size: 1.4rem; font-weight: 800; letter-spacing: 0.05em; margin-bottom: 0.5rem; animation: pulse 1.8s infinite ease-in-out;">⚓ ANCHOR PORTAL</div>
          <div class="spinner" style="width: 2.2rem; height: 2.2rem; border: 3px solid rgba(96, 165, 250, 0.1); border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
        </div>
        <style>
          @keyframes spin {
            to { transform: rotate(360deg); }
          }
          @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
          }
        </style>
        <script>
          // 테마 동적 매칭 스타일
          (function() {
            var darkTheme = localStorage.getItem("anchor_dark_mode");
            var isDark = darkTheme === null ? true : JSON.parse(darkTheme);
            var preLoader = document.getElementById("pre-loader");
            if (preLoader) {
              preLoader.style.backgroundColor = isDark ? "#0f0f12" : "#f9fafb";
              preLoader.style.color = isDark ? "#ffffff" : "#111827";
            }
          })();
        </script>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
